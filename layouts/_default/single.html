{{ define "main" }}
<div class="container">
  <article class="post-article">
    <header class="post-header">
      <h1 class="post-title">{{ .Title }}</h1>
      {{ with .Date }}
      <div class="post-meta">
        <time datetime="{{ dateFormat "2006-01-02" . }}">{{ dateFormat "2006-01-02" . }}</time>
      </div>
      {{ end }}
    </header>
    <div class="article-body prose">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
