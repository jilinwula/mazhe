baseURL = "https://mazhe.pub/"
languageCode = "zh-CN"
title = "码者"
theme = "blowfish"
enableRobotsTXT = true
buildDrafts = false

[params]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  description = "开发者的效率工具"

  [params.author]
    name = "码者团队"

  [params.homepage]
    layout = "background"
    showRecent = true
    recentLimit = 5

[menu]
  [[menu.main]]
    name = "博客"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "更新日志"
    url = "/changelog/"
    weight = 20
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
  [markup.goldmark.renderer]
    unsafe = true
