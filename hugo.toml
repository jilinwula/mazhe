baseURL = "https://mazhe.pub/"
languageCode = "zh-CN"
title = "码者"
theme = "hugo-book"
enableRobotsTXT = true
buildDrafts = false

[params]
  BookTheme = "dark"
  BookToC = true
  BookSearch = true
  BookMenuBundle = false
  BookSection = "posts"
  BookRepo = ""
  BookDateFormat = "2006-01-02"
  BookDescription = "开发者的效率工具"

[menu]
  [[menu.after]]
    name = "博客"
    url = "/posts/"
    weight = 10
  [[menu.after]]
    name = "更新日志"
    url = "/changelog/"
    weight = 20
  [[menu.after]]
    name = "关于"
    url = "/about/"
    weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
  [markup.goldmark.renderer]
    unsafe = true
